# End-to-end smoke: launch the gibson-tool-runner:hello-dev image via Setec,
# feed it GIBSON_TOOL_INPUT_B64 with a StringValue{"world"}, parse the
# ===GIBSON_TOOL_OUTPUT=== stdout marker, and assert the decoded proto is
# StringValue{"hello, world"}.
#
# This exercises the same ABI that core/gibson/internal/harness/sandboxed.Executor
# uses, so passing here proves the full round-trip minus the daemon's in-process
# routing (which we separately verified is wired via the "sandboxed tool executor
# wired" log line).
apiVersion: v1
kind: ConfigMap
metadata:
  name: hello-toolrunner-smoke-source
  namespace: gibson
data:
  go.mod: |
    module hello-toolrunner-smoke

    go 1.25

    require (
        github.com/zeroroot-ai/setec v0.0.2
        google.golang.org/grpc v1.72.2
        google.golang.org/protobuf v1.36.11
    )
  main.go: |
    package main

    import (
        "bytes"
        "context"
        "crypto/tls"
        "crypto/x509"
        "encoding/base64"
        "fmt"
        "io"
        "log"
        "os"
        "strings"
        "time"

        sandboxv1 "github.com/zeroroot-ai/setec/api/grpc/v1"
        "google.golang.org/grpc"
        "google.golang.org/grpc/credentials"
        "google.golang.org/protobuf/encoding/protojson"
        "google.golang.org/protobuf/types/known/wrapperspb"
    )

    const marker = "===GIBSON_TOOL_OUTPUT==="

    func main() {
        addr := os.Getenv("SETEC_ADDR")
        if addr == "" {
            log.Fatal("SETEC_ADDR not set")
        }

        ca, err := os.ReadFile("/etc/setec-tls/ca.crt")
        if err != nil { log.Fatalf("read ca: %v", err) }
        cert, err := tls.LoadX509KeyPair("/etc/setec-tls/client.crt", "/etc/setec-tls/client.key")
        if err != nil { log.Fatalf("load client cert: %v", err) }
        pool := x509.NewCertPool()
        if !pool.AppendCertsFromPEM(ca) { log.Fatal("ca append") }

        creds := credentials.NewTLS(&tls.Config{
            Certificates: []tls.Certificate{cert},
            RootCAs:      pool,
            ServerName:   "setec-frontend.setec-system.svc",
            MinVersion:   tls.VersionTLS12,
        })

        ctx, cancel := context.WithTimeout(context.Background(), 180*time.Second)
        defer cancel()

        conn, err := grpc.NewClient(addr, grpc.WithTransportCredentials(creds))
        if err != nil { log.Fatalf("dial %s: %v", addr, err) }
        defer conn.Close()
        cli := sandboxv1.NewSandboxServiceClient(conn)

        // Marshal StringValue{"world"} as protojson (same as sandboxed.Executor).
        reqMsg := wrapperspb.String("world")
        inJSON, err := protojson.Marshal(reqMsg)
        if err != nil { log.Fatalf("marshal input: %v", err) }
        b64In := base64.StdEncoding.EncodeToString(inJSON)

        fmt.Printf("dispatching hello tool with input=%q\n", reqMsg.GetValue())
        launch, err := cli.Launch(ctx, &sandboxv1.LaunchRequest{
            Image:   "ghcr.io/zeroroot-ai/gibson-tool-runner:hello-dev",
            Command: []string{"/tool-runner"},
            Env: map[string]string{
                "GIBSON_TOOL_INPUT_B64": b64In,
            },
            Resources: &sandboxv1.Resources{Vcpu: 1, Memory: "128Mi"},
        })
        if err != nil { log.Fatalf("launch: %v", err) }
        sid := launch.GetSandboxId()
        fmt.Printf("launched sandbox %s\n", sid)

        // Collect stdout to parse the marker.
        var buf bytes.Buffer
        logsDone := make(chan struct{})
        go func() {
            defer close(logsDone)
            stream, err := cli.StreamLogs(ctx, &sandboxv1.StreamLogsRequest{SandboxId: sid, Follow: true})
            if err != nil { log.Printf("stream logs: %v", err); return }
            for {
                chunk, err := stream.Recv()
                if err == io.EOF { return }
                if err != nil { log.Printf("recv: %v", err); return }
                buf.Write(chunk.GetData())
            }
        }()

        wait, err := cli.Wait(ctx, &sandboxv1.WaitRequest{SandboxId: sid})
        if err != nil { log.Fatalf("wait: %v", err) }
        <-logsDone
        fmt.Printf("sandbox exit=%d reason=%q\n", wait.GetExitCode(), wait.GetReason())

        out := buf.String()
        fmt.Printf("---- sandbox stdout (%d bytes) ----\n%s\n---- end stdout ----\n", len(out), out)

        // Parse the marker line.
        idx := strings.Index(out, marker)
        if idx < 0 { log.Fatalf("FAIL: marker %q not found in stdout", marker) }
        rest := out[idx+len(marker):]
        line := strings.TrimLeft(rest, " \t")
        if eol := strings.Index(line, "\n"); eol >= 0 { line = line[:eol] }
        line = strings.TrimSpace(line)
        b64Out, err := base64.StdEncoding.DecodeString(line)
        if err != nil { log.Fatalf("decode b64 output: %v (line=%q)", err, line) }

        var respMsg wrapperspb.StringValue
        if err := protojson.Unmarshal(b64Out, &respMsg); err != nil {
            log.Fatalf("unmarshal output proto: %v (raw=%q)", err, string(b64Out))
        }
        fmt.Printf("decoded tool output: %q\n", respMsg.GetValue())

        const want = "hello, world"
        if respMsg.GetValue() != want {
            log.Fatalf("FAIL: want=%q got=%q", want, respMsg.GetValue())
        }
        fmt.Println("PASS: hello tool-runner end-to-end (Kind -> Setec -> microVM -> Kind) verified")
    }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: hello-toolrunner-smoke
  namespace: gibson
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: smoke
          image: golang:1.25-alpine
          command: ["sh", "-c"]
          args:
            - |
              set -e
              apk add --no-cache git ca-certificates >/dev/null
              mkdir -p /work && cd /work
              cp /src/go.mod /src/main.go .
              go mod tidy
              go run main.go
          volumeMounts:
            - name: src
              mountPath: /src
            - name: tls
              mountPath: /etc/setec-tls
              readOnly: true
          env:
            - name: GOPROXY
              value: "https://proxy.golang.org,direct"
            - name: SETEC_ADDR
              value: "__SETEC_ADDR__"
      volumes:
        - name: src
          configMap:
            name: hello-toolrunner-smoke-source
        - name: tls
          secret:
            secretName: setec-client-tls
