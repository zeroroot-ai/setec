# This rule is not used by the project setec itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the setec.setec.zeroroot.ai.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: setec
    app.kubernetes.io/managed-by: kustomize
  name: sandbox-editor-role
rules:
- apiGroups:
  - setec.setec.zeroroot.ai
  resources:
  - sandboxes
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - setec.setec.zeroroot.ai
  resources:
  - sandboxes/status
  verbs:
  - get
