# -- Container image for the Setec operator.
image:
  # -- Image repository. Override to pull from a private mirror.
  repository: ghcr.io/zeroroot-ai/setec
  # -- Image tag. Defaults to the chart's appVersion when left empty.
  tag: "0.1.0"
  # -- Image pull policy. One of Always, Never, IfNotPresent.
  pullPolicy: IfNotPresent

# -- imagePullSecrets is a list of Secret references the Pod uses when pulling
# the operator image from a private registry. Leave empty for public images.
imagePullSecrets: []

# -- nameOverride replaces the chart name used in resource names, keeping the
# release-name prefix. Use fullnameOverride for a full replacement.
nameOverride: ""

# -- fullnameOverride replaces the full resource name prefix entirely. When set
# it bypasses both the chart name and the release name in generated objects.
fullnameOverride: ""

# -- createNamespace toggles chart-managed creation of the target namespace.
# Leave false when managing namespaces out of band (e.g. `helm install
# --create-namespace`). When true, a Namespace object is templated with the
# name set by .Values.namespace.
createNamespace: false

# -- namespace is the namespace the Deployment and ServiceAccount are rendered
# into. The chart does not currently pin cluster-scoped resources to this
# namespace (ClusterRole/ClusterRoleBinding are global by nature), but the
# RoleBinding subjects reference this namespace.
namespace: setec-system

# -- replicas is the number of controller-manager Pods. Default is 1 because
# the operator runs a single leader. Set to 2+ and enable leaderElect to get
# HA with only one active reconciler at a time.
replicas: 1

# -- resources describes the Pod's CPU and memory requests and limits. The
# defaults are sized for a small controller-manager; tune upward only if
# metrics show sustained throttling or OOM.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# -- runtimeClassName is the name of the Kata RuntimeClass the operator will
# attach to every Sandbox Pod it creates. Must match the RuntimeClass
# installed by kata-deploy on your cluster. Default `kata-fc` selects the
# Firecracker VMM configuration.
# Deprecated: use runtimes.kata-fc.runtimeClassName instead. When set, populates
# runtimes.kata-fc.runtimeClassName for backwards compat. Scheduled for
# removal one release after the runtimes block becomes the canonical config.
runtimeClassName: kata-fc

# -- runtimes declares the isolation backends the operator knows about and
# whether each is installed on this cluster. The admission webhook and
# reconciler use this set to validate SandboxClass specs, select backends at
# launch time, and render only the RuntimeClass manifests that match. Every
# enabled=true entry MUST correspond to a RuntimeClass present in the cluster
# (either managed by this chart with install=true, or installed out of band
# with install=false).
runtimes:
  # -- kata-fc is kata-containers with the Firecracker VMM. Lowest attack
  # surface and fastest cold start among the kata variants. Requires KVM
  # exposed on the node, which rules out most managed-Kubernetes non-metal
  # node pools (EKS/AKS/GKE default worker SKUs do NOT expose KVM).
  kata-fc:
    # -- enabled gates this backend cluster-wide. When false the webhook
    # rejects SandboxClass specs that reference it and no RuntimeClass is
    # rendered.
    enabled: true
    # -- runtimeClassName is the RuntimeClass name the operator attaches to
    # Pods targeting this backend. Must match the name of the cluster's
    # kata-fc RuntimeClass.
    runtimeClassName: kata-fc
    # -- install controls whether this chart renders the RuntimeClass object.
    # Set to false when an external process (e.g. kata-deploy, the cloud
    # provider, a separate Helm chart) already manages the RuntimeClass.
    install: true
    # -- defaultOverhead is the resource overhead applied to Sandbox Pods
    # when the SandboxClass does not set its own. Accounts for the
    # Firecracker VMM process memory and a small vCPU reservation.
    defaultOverhead:
      memory: 128Mi
      cpu: 250m
  # -- kata-qemu is kata-containers with the QEMU VMM. Slower and heavier
  # than kata-fc but works on nodes without KVM (falls back to TCG
  # emulation — orders of magnitude slower, use only when you must). Useful
  # as a compatibility tier on managed-K8s nodes that block KVM.
  kata-qemu:
    # -- enabled disabled by default. Opt in explicitly; the performance
    # characteristics are very different from kata-fc.
    enabled: false
    # -- runtimeClassName must match the cluster's kata-qemu RuntimeClass.
    runtimeClassName: kata-qemu
    # -- install toggles chart-managed RuntimeClass. See kata-fc.install.
    install: true
    # -- defaultOverhead mirrors kata-fc — QEMU's footprint is larger but
    # the Kubernetes-level overhead accounting remains the same ballpark.
    defaultOverhead:
      memory: 128Mi
      cpu: 250m
  # -- gvisor is a userspace syscall-filter kernel (runsc). Lower overhead
  # than a microVM (no VMM, no separate kernel image) but weaker isolation:
  # a kernel bug in runsc is a sandbox escape. Good middle-ground when
  # nested virt is unavailable and runc is too permissive.
  gvisor:
    # -- enabled disabled by default. Requires runsc binary + containerd
    # runtime handler on every node where you schedule gvisor workloads.
    enabled: false
    # -- runtimeClassName must match the cluster's gvisor RuntimeClass.
    runtimeClassName: gvisor
    # -- install toggles chart-managed RuntimeClass.
    install: true
    # -- defaultOverhead is the gvisor sentry process footprint — much
    # smaller than a full VMM.
    defaultOverhead:
      memory: 40Mi
      cpu: 50m
  # -- runc is plain Linux container namespaces — the default Kubernetes
  # runtime. NO isolation beyond namespaces and seccomp. DEV/DEBUG ONLY;
  # gated behind the namespace label setec.zeroroot.ai/allow-dev-runtimes
  # by the admission webhook. Never use in production tenancy scenarios.
  runc:
    # -- enabled disabled by default. Intended to simplify local dev and
    # CI where you want to exercise the Setec control plane without a
    # real isolation layer.
    enabled: false
    # -- runtimeClassName must match the cluster's runc RuntimeClass.
    runtimeClassName: runc
    # -- install toggles chart-managed RuntimeClass.
    install: true
    # -- devOnly is the admission-webhook gate. The webhook will reject
    # SandboxClass specs referencing runc unless the target namespace
    # carries setec.zeroroot.ai/allow-dev-runtimes=true. Do not set to
    # false without understanding the tenancy implications.
    devOnly: true

# -- defaults captures cluster-wide runtime selection defaults consumed by the
# operator, the admission webhook, and the node-agent DaemonSet. These are
# read at startup from /etc/setec/runtimes.yaml (rendered from values into a
# ConfigMap). Changes require a controller restart to take effect.
defaults:
  runtime:
    # -- backend is the cluster-default isolation backend applied when a
    # Sandbox references no SandboxClass, or when a SandboxClass leaves
    # runtime.backend unset. MUST name a backend with enabled=true in the
    # runtimes block above, or the chart will fail to install.
    backend: kata-fc
    # -- fallback is the ordered list of backends the reconciler tries when
    # the primary backend has no capable node (e.g. kata-fc on a KVM-less
    # fleet). Each entry must be enabled. Empty list disables fallback and
    # surfaces the unschedulable condition instead.
    fallback: []
    # -- probeInterval is how often the node-agent DaemonSet re-probes node
    # capabilities and refreshes the setec.zeroroot.ai/runtime.<backend>
    # labels. Shorter intervals detect KVM removal faster at the cost of
    # extra node-agent wake-ups. Parsed as a Go duration.
    probeInterval: 5m
    # -- nodeCapabilitiesMode selects how the operator learns node runtime
    # capabilities. Only "probe" (default) is supported: the node-agent
    # DaemonSet probes each node and writes setec.zeroroot.ai/runtime.<backend>
    # labels, which the operator reads for scheduling. (A never-implemented
    # "static" mode was removed; the operator rejects it at config load.)
    nodeCapabilitiesMode: probe

# -- runtimeAgent configures the per-node capabilities probing DaemonSet that
# writes setec.zeroroot.ai/runtime.<backend>=true|false labels and the
# SetecRuntimes Node status condition.
runtimeAgent:
  image:
    # -- repository is the runtime-agent image. Override for private
    # mirrors.
    repository: ghcr.io/zeroroot-ai/setec-runtime-agent
    # -- tag defaults to .Chart.AppVersion when left empty. Pin explicitly
    # for reproducible deploys.
    tag: ""
    # -- pullPolicy one of Always, Never, IfNotPresent.
    pullPolicy: IfNotPresent
  # -- resources sizes the runtime-agent container. It is near-idle between
  # probe cycles (default 5m), so small requests are appropriate.
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi
  # -- metricsPort is the TCP port the agent serves /metrics and /healthz
  # on. Probes target this port.
  metricsPort: 8080
  # -- mountContainerdConfig toggles the read-only hostPath mount of
  # /etc/containerd into the agent. The gvisor/runc probes peek at the
  # containerd runtime config to confirm a handler is registered. Disable
  # on nodes where /etc/containerd is locked down and false-negatives are
  # acceptable.
  mountContainerdConfig: true

# -- nodeSelectorLabel is the Node label key the startup prerequisite check
# uses to determine whether any Kata-capable Nodes exist. Informational only;
# actual scheduling uses the RuntimeClass.
nodeSelectorLabel: katacontainers.io/kata-runtime

# -- leaderElect enables controller-runtime leader election. Required when
# running more than one replica; safe to leave false for the default single
# replica deployment.
leaderElect: false

# -- metricsPort is the TCP port the operator serves Prometheus metrics on.
# The /metrics endpoint is exposed on this port.
metricsPort: 8080

# -- healthPort is the TCP port the operator serves /healthz and /readyz on.
# The Helm-templated liveness and readiness probes target this port.
healthPort: 8081

# -- serviceAccount controls ServiceAccount creation and naming. When
# create is true the chart renders a ServiceAccount named `{fullname}` (or
# the value of .name, if set). When false the operator uses an existing SA
# whose name is given by .name.
serviceAccount:
  create: true
  name: ""

# -- podSecurityContext is applied at the Pod level. Enforces the secure
# defaults required by NFR Security: runs as a non-root user and uses the
# RuntimeDefault seccomp profile so the kernel syscall surface matches the
# container runtime's baseline.
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# -- containerSecurityContext is applied at the container level. Drops every
# Linux capability, forbids privilege escalation, and runs on a read-only
# root filesystem. The distroless base image has no shell or package manager
# so these restrictions do not limit operation.
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  capabilities:
    drop:
      - ALL

# -- nodeSelector constrains the operator Pod to Nodes matching these labels.
# The operator itself does not need Kata-capable Nodes, so leave empty unless
# you need to pin it.
nodeSelector: {}

# -- tolerations allow the operator Pod to schedule onto tainted Nodes. The
# operator is stateless and usually belongs on control-plane or general Nodes,
# not on the Kata workload Nodes.
tolerations: []

# -- affinity controls Pod affinity and anti-affinity. Use this to spread
# multiple replicas across Nodes when leaderElect is enabled.
affinity: {}

# ---------------------------------------------------------------------------
# Phase 2: multi-tenancy, observability, webhook, node-agent, frontend.
# Every block below is OFF by default — a helm install with no overrides
# behaves identically to Phase 1. Opt in one feature at a time.
# ---------------------------------------------------------------------------

# -- multiTenancy enables per-namespace tenant-label enforcement. When on,
# Sandboxes in a namespace without the configured tenant label are
# rejected (Event + Pending status).
multiTenancy:
  enabled: false
  # tenantLabelKey is the label key checked on the namespace.
  tenantLabelKey: setec.zeroroot.ai/tenant

# -- observability controls OpenTelemetry tracing and Prometheus scraping
# options.
observability:
  enabled: false
  # otlpEndpoint is the gRPC OTLP collector address (e.g.
  # "otel-collector.monitoring.svc:4317"). Empty disables tracing.
  otlpEndpoint: ""
  # metricsEnabled leaves /metrics exposed even when tracing is off.
  metricsEnabled: true
  # otelTLS configures the OTLP exporter's transport. Default is TLS
  # using the pod's system root CAs; set caSecretName to inject a
  # private CA bundle. Setting enabled: false falls back to plaintext
  # export — NEVER do this in production; the operator emits a loud
  # warning on startup.
  otelTLS:
    enabled: true
    # caSecretName is the name of a Secret containing a single
    # `ca.crt` key. When set the operator mounts it at
    # /etc/setec/otel-ca and passes --otel-ca-file. Empty uses system
    # root CAs.
    caSecretName: ""

# -- webhook installs the ValidatingWebhookConfiguration + Service that
# route admission requests to the operator's built-in webhook server.
webhook:
  enabled: false
  # failurePolicy is propagated to the ValidatingWebhookConfiguration.
  failurePolicy: Fail
  # certSecret is the Secret (keys tls.crt/tls.key) mounted into the operator
  # at the webhook server's cert dir (/tmp/k8s-webhook-server/serving-certs).
  # Empty defaults to "<release>-webhook-cert". With certManager.enabled the
  # cert-manager Certificate writes this Secret; otherwise an admin or the e2e
  # harness creates it and sets caBundle below.
  certSecret: ""
  # caBundle is the base64-encoded PEM CA that signed the webhook serving cert,
  # used by the API server to verify the TLS connection when certManager is
  # disabled. cert-manager injects this via the inject-ca-from annotation.
  caBundle: ""
  # certManager integration optionally issues/rotates the webhook TLS
  # cert. When disabled, an administrator must mount a Secret at
  # /tmp/k8s-webhook-server/serving-certs.
  certManager:
    enabled: false
    issuerRef:
      kind: ClusterIssuer
      name: selfsigned

# -- nodeAgent installs the DaemonSet that manages the devicemapper
# thin-pool, samples fill state, and exposes node-level Prometheus
# metrics.
nodeAgent:
  enabled: false
  image:
    repository: ghcr.io/zeroroot-ai/setec-node-agent
    tag: "0.2.0"
    pullPolicy: IfNotPresent
  # Kata-runtime node selector. Must match the label the cluster admin
  # applies to KVM-capable nodes.
  nodeSelector:
    katacontainers.io/kata-runtime: "true"
  thinpoolDataDevice: ""
  thinpoolMetadataDevice: ""
  fillThreshold: 80
  # containerdSocket is the containerd Unix socket the agent dials for image
  # prefetch and for the orphan-sandbox reaper's CRI calls. k3s uses
  # /run/k3s/containerd/containerd.sock; stock containerd uses the default.
  containerdSocket: /run/containerd/containerd.sock
  # orphanReaper force-removes NotReady kata sandboxes whose microVM leaked on
  # a failed teardown ("Agent did not stop sandbox") and still holds a
  # containerd name reservation — otherwise the replacement Pod hangs in
  # ContainerCreating ("failed to reserve sandbox name"). See setec#86.
  orphanReaper:
    enabled: true
    # interval between reap sweeps (Go duration). 0 (or enabled:false) disables.
    interval: 1m
  # prefetchImages is a space-separated list of OCI references the
  # agent pulls into the containerd content store on startup.
  prefetchImages: ""
  # resources for the node-agent container. Under-provisioned by
  # design; the agent is near-idle between samples.
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# -- frontend installs the gRPC SandboxService Deployment.
frontend:
  enabled: false
  image:
    repository: ghcr.io/zeroroot-ai/setec-frontend
    tag: "0.2.0"
    pullPolicy: IfNotPresent
  # listenAddr is the gRPC bind address inside the Pod.
  listenAddr: ":50051"
  # servicePort is the ClusterIP service port.
  servicePort: 50051
  # metricsPort is the HTTP Prometheus port.
  metricsPort: 9091
  # tlsCertSecretName is the name of the Secret holding server.crt/server.key.
  # REQUIRED when frontend.enabled=true — mTLS is mandatory for the
  # gRPC frontend.
  tlsCertSecretName: ""
  # tlsClientCASecretName is a Secret holding ca.crt for client-cert
  # verification. REQUIRED when frontend.enabled=true — mTLS is the
  # only supported authentication mechanism.
  tlsClientCASecretName: ""
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -- defaultClass optionally templates a cluster-default SandboxClass so
# tenant Sandboxes without a class name resolve to a sane baseline.
defaultClass:
  enabled: false
  name: default
  spec:
    vmm: firecracker
    runtimeClassName: kata-fc
    maxResources:
      vcpu: 8
      memory: 16Gi
    default: true

# ---------------------------------------------------------------------------
# Phase 3: snapshot, restore, pause/resume, pre-warmed pool.
# Every block below is OFF by default; a helm install with no overrides
# renders Phase 2-equivalent manifests.
# ---------------------------------------------------------------------------

# -- snapshots is the Phase 3 master kill-switch. When false the manager
# binary is invoked without --snapshots-enabled, the Snapshot CRD
# controller does not run, and the SandboxReconciler falls back to
# Phase 2 semantics.
snapshots:
  enabled: false
  # backend selects the snapshot storage backend. Only "local-disk" ships
  # in Phase 3.
  backend: local-disk
  # localDisk holds the backend-specific configuration the node-agent
  # consumes.
  localDisk:
    # root is the per-node directory state files are written to.
    root: /var/lib/setec/snapshots
    # fillThreshold is the used fraction above which Save calls are
    # refused with ErrInsufficientStorage. 0 disables the check.
    fillThreshold: 0.85
  # kataSocketPattern is the format string the Coordinator and node-agent
  # share to render a Firecracker API socket path from a Pod UID.
  kataSocketPattern: /run/kata-containers/%s/firecracker.socket
  # mTLS configuration for the operator<->node-agent gRPC channel. When
  # certManager.enabled is true the chart renders Certificate resources
  # and the Deployment/DaemonSet mount the resulting Secrets. Otherwise
  # the operator must mount its own Secrets.
  mTLS:
    operatorCertSecret: setec-nodeagent-client-tls
    nodeAgentCertSecret: setec-nodeagent-server-tls
    caSecret: setec-nodeagent-ca
    certManager:
      enabled: false
      issuerRef:
        kind: ClusterIssuer
        name: selfsigned

# -- preWarmPool controls the per-SandboxClass pre-warm pool feature.
# When disabled at the chart level, all SandboxClasses behave as if
# their preWarmPoolSize were 0 regardless of field values.
preWarmPool:
  enabled: false
