{{- if .Values.nodeAgent.enabled -}}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "setec.fullname" . }}-node-agent
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "setec.labels" . | nindent 4 }}
    app.kubernetes.io/component: node-agent
spec:
  selector:
    matchLabels:
      {{- include "setec.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: node-agent
  template:
    metadata:
      labels:
        {{- include "setec.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: node-agent
    spec:
      serviceAccountName: {{ include "setec.fullname" . }}-node-agent
      hostNetwork: false
      nodeSelector:
        {{- toYaml .Values.nodeAgent.nodeSelector | nindent 8 }}
      # The agent is privileged because devmapper operations require
      # the kernel device cgroup and mounting /dev. Capabilities are
      # scoped to the minimum set explained in the chart README.
      containers:
        - name: node-agent
          image: "{{ .Values.nodeAgent.image.repository }}:{{ .Values.nodeAgent.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.nodeAgent.image.pullPolicy }}
          args:
            - --thinpool-name=setec-thinpool
            - --thinpool-data-device={{ .Values.nodeAgent.thinpoolDataDevice }}
            - --thinpool-metadata-device={{ .Values.nodeAgent.thinpoolMetadataDevice }}
            - --fill-threshold={{ .Values.nodeAgent.fillThreshold }}
            - --metrics-addr=:9090
            - --containerd-socket={{ .Values.nodeAgent.containerdSocket }}
            {{- if .Values.nodeAgent.orphanReaper.enabled }}
            - --orphan-reap-interval={{ .Values.nodeAgent.orphanReaper.interval }}
            {{- else }}
            - --orphan-reap-interval=0
            {{- end }}
            {{- if .Values.nodeAgent.prefetchImages }}
            - --prefetch-images={{ .Values.nodeAgent.prefetchImages }}
            {{- end }}
            {{- if .Values.snapshots.enabled }}
            - --grpc-listen-addr=:50052
            - --snapshot-backend={{ .Values.snapshots.backend }}
            - --snapshot-root={{ .Values.snapshots.localDisk.root }}
            - --snapshot-fill-threshold={{ .Values.snapshots.localDisk.fillThreshold }}
            - --kata-socket-pattern={{ .Values.snapshots.kataSocketPattern }}
            - --tls-cert=/etc/setec/nodeagent-tls/tls.crt
            - --tls-key=/etc/setec/nodeagent-tls/tls.key
            - --tls-client-ca=/etc/setec/nodeagent-ca/ca.crt
            {{- else }}
            - --grpc-listen-addr=
            {{- end }}
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
            {{- if .Values.snapshots.enabled }}
            - name: grpc
              containerPort: 50052
              protocol: TCP
            {{- end }}
          securityContext:
            # Privileged because the agent manipulates
            # /dev/mapper entries and talks to the kernel's
            # device-mapper subsystem. Non-privileged operation is
            # not possible for thin-pool provisioning.
            privileged: true
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
              add:
                - SYS_ADMIN
          volumeMounts:
            - name: dev
              mountPath: /dev
            - name: sys
              mountPath: /sys
            - name: run
              mountPath: /run
            {{- if .Values.snapshots.enabled }}
            - name: snapshot-root
              mountPath: {{ .Values.snapshots.localDisk.root }}
            - name: nodeagent-tls
              mountPath: /etc/setec/nodeagent-tls
              readOnly: true
            - name: nodeagent-ca
              mountPath: /etc/setec/nodeagent-ca
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.nodeAgent.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: dev
          hostPath:
            path: /dev
        - name: sys
          hostPath:
            path: /sys
        - name: run
          hostPath:
            path: /run
        {{- if .Values.snapshots.enabled }}
        - name: snapshot-root
          hostPath:
            path: {{ .Values.snapshots.localDisk.root }}
            type: DirectoryOrCreate
        - name: nodeagent-tls
          secret:
            secretName: {{ .Values.snapshots.mTLS.nodeAgentCertSecret }}
        - name: nodeagent-ca
          secret:
            secretName: {{ .Values.snapshots.mTLS.caSecret }}
        {{- end }}
      tolerations:
        - operator: Exists
          effect: NoSchedule
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "setec.fullname" . }}-node-agent
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "setec.labels" . | nindent 4 }}
    app.kubernetes.io/component: node-agent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "setec.fullname" . }}-node-agent
  labels:
    {{- include "setec.labels" . | nindent 4 }}
rules:
  # Update node-level conditions (SetecThinPoolReady etc.).
  - apiGroups: [""]
    resources: [nodes/status]
    verbs: [patch, update]
  - apiGroups: [""]
    resources: [nodes]
    verbs: [get, list, watch]
  # Emit Events on the node.
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "setec.fullname" . }}-node-agent
  labels:
    {{- include "setec.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "setec.fullname" . }}-node-agent
subjects:
  - kind: ServiceAccount
    name: {{ include "setec.fullname" . }}-node-agent
    namespace: {{ .Values.namespace }}
{{- end }}
