{{- /*
One node.k8s.io/v1 RuntimeClass per enabled backend where install=true.
When install=false we assume an external process (kata-deploy, cluster
installer, custom Helm chart) owns the RuntimeClass lifecycle and skip
rendering so Helm never fights for ownership.

Handler names come from the setec.runtimeHandler helper:
  kata-fc     -> "kata-fc"   (kata-containers Firecracker handler)
  kata-qemu   -> "kata-qemu" (kata-containers QEMU handler)
  gvisor      -> "runsc"     (gvisor containerd handler)
  runc        -> "runc"      (upstream runc handler)
*/ -}}
{{- range $name, $cfg := .Values.runtimes }}
{{- if and $cfg.enabled $cfg.install }}
---
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: {{ $cfg.runtimeClassName | default $name }}
  labels:
    {{- include "setec.labels" $ | nindent 4 }}
    app.kubernetes.io/component: runtime-class
    setec.zeroroot.ai/runtime: {{ $name | quote }}
handler: {{ include "setec.runtimeHandler" $name }}
scheduling:
  nodeSelector:
    setec.zeroroot.ai/runtime.{{ $name }}: "true"
{{- end }}
{{- end }}
