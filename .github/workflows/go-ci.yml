name: go-ci

# Thin caller for the canonical three-tier Go CI (Epic: cicd-efficiency,
# board #44, slice S11b, .github#203). See docs/architecture/CICD-CONTEXT.md
# (workspace docs repo) and docs/adr/0060-ci-runner-split-hosted-default-
# ephemeral-metal.md for the org-wide tiering rationale.
#
# Replaces the former all-in-one ci.yml (365 lines), which ran every job on
# both `pull_request` and `push:main`, double-firing full suites. setec is a
# PUBLIC Apache-2.0 repo whose only zeroroot-ai Go dependency is the public
# ast-checks module, so it needs no private-module git auth: both reusable
# calls below pass `private-modules: false` and no `gh-pat` secret.
#
#   pull_request -> fast tier:  quick contributor signal. The reusable's fast
#                                tier gives mod-tidy drift check, go vet, go
#                                build, and a plain `go test` (no race). setec
#                                keeps its own cheap native guards alongside
#                                it: lint (Makefile-pinned golangci-lint + buf
#                                lint), proto-breaking, generated-file drift
#                                (manifests/proto), helm-lint, a no-push
#                                docker build (compile-validity, not a deploy
#                                step), the binary flag smoke test, the
#                                markdown link check, the marker/insecure-
#                                flag/unimplemented greps, and the 3
#                                examples-build jobs (separate Go modules
#                                under examples/, unreachable by the
#                                reusable, which only knows the root module).
#
#   merge_group  -> heavy tier: the ONE authoritative gate before landing.
#                                The reusable's heavy tier gives `go test
#                                -race ./...` and govulncheck (root module,
#                                MEDIUM+ severity). setec adds its own
#                                envtest suite (`make test` -- real
#                                apiserver via KUBEBUILDER_ASSETS, produces a
#                                coverage artifact; NOT equivalent to the
#                                reusable's plain `go test`) and the 3
#                                examples-govulncheck jobs (moved from the
#                                now-deleted security.yaml -- those are
#                                separate Go modules the reusable can't
#                                reach, and per decision 9, scanner cadence
#                                belongs on merge_group).
#
# merge_group is inert until the merge queue is enabled on setec -- wiring it
# now is intentionally a no-op until then.
#
# setec keeps its own Makefile-pinned golangci-lint (`make lint`) instead of
# delegating to the reusable's built-in golangci-lint-action step: the
# reusable pins golangci-lint-action to a fixed version, which can silently
# diverge from the repo's Makefile-pinned version and trail go.mod's
# toolchain target -- the "v2 trap" gibson was already bitten by once
# (sdk#355/adk#154). Passing `skip-lint: true` avoids double-running
# golangci-lint under two different pins.
#
# security.yaml is DELETED by this change: its root-module govulncheck is
# now covered by the `heavy` job's reusable call; its three example-module
# govulncheck invocations moved into the examples-govulncheck job below
# (pinned to the same govulncheck version the reusable installs, v1.1.4, so
# a single PR/queue-run sees one consistent scanner version rather than
# `@latest` drifting mid-flight).

on:
  pull_request:
  merge_group:

concurrency:
  group: go-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---- fast tier (pull_request): reusable mod-tidy/vet/build/test ----
  fast:
    if: github.event_name == 'pull_request'
    uses: zeroroot-ai/.github/.github/workflows/reusable-go-ci.yml@v2
    with:
      tier: fast
      private-modules: false
      skip-lint: true # setec runs its own pinned golangci-lint below (make lint)

  # ---- heavy tier (merge_group): reusable race test + govulncheck ----
  heavy:
    if: github.event_name == 'merge_group'
    uses: zeroroot-ai/.github/.github/workflows/reusable-go-ci.yml@v2
    with:
      tier: heavy
      private-modules: false

  # ---- setec-specific lint (fast tier / pull_request) ----
  lint:
    name: Lint (golangci-lint + buf)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify lint config
        run: make lint-config

      - name: Run linter
        run: make lint

      - name: Install buf
        run: go install github.com/bufbuild/buf/cmd/buf@v1.47.2

      - name: Run buf lint
        run: buf lint

  # ---- proto WIRE-breaking gate (fast tier / pull_request) ----
  proto-breaking:
    name: Proto WIRE-breaking gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history so buf can diff the proto against the merge base.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install buf
        run: go install github.com/bufbuild/buf/cmd/buf@v1.47.2

      - name: Buf breaking (WIRE) vs main
        # The setec.v1 SandboxService ABI is wire-stable. This gate rejects
        # any change that breaks an existing wire encoding (changed field
        # numbers/types, removed fields). Additive fields, renames, and doc
        # edits pass.
        run: |
          git fetch origin "${GITHUB_BASE_REF:-main}" --depth=1 || true
          base="origin/${GITHUB_BASE_REF:-main}"
          if git rev-parse --verify "$base" >/dev/null 2>&1; then
            buf breaking --against ".git#ref=$base"
          else
            echo "No base ref to diff against; skipping breaking check."
          fi

  # ---- envtest suite (heavy tier / merge_group) ----
  # `make test` runs unit + envtest (real apiserver via KUBEBUILDER_ASSETS,
  # installed transitively by the Makefile target) and produces cover.out.
  # This is NOT equivalent to the reusable's plain `go test`: it needs the
  # envtest control-plane binaries and emits a coverage artifact. It is
  # setec's authoritative test suite (closest to integration), so it belongs
  # in the merge_group-only tier alongside the reusable's `-race` run rather
  # than duplicating a lighter variant on pull_request.
  test:
    name: Unit + envtest
    if: github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: make test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: cover.out
          if-no-files-found: warn
          retention-days: 14

  # ---- generated-file drift gates (fast tier / pull_request) ----
  manifests-up-to-date:
    name: Manifests up-to-date
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Regenerate manifests and deepcopy
        run: make manifests generate

      - name: Verify no uncommitted changes
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generated files are out of date."
            echo "::error::Run 'make manifests generate' locally and commit the result."
            exit 1
          fi

  proto-up-to-date:
    name: Proto up-to-date
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Regenerate proto stubs
        run: make proto

      - name: Verify no uncommitted changes
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generated proto files are out of date."
            echo "::error::Run 'make proto' locally and commit the result."
            exit 1
          fi

  # ---- helm chart gates (fast tier / pull_request) ----
  helm-lint:
    name: Helm lint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.16.1

      - name: Helm lint (strict)
        run: helm lint charts/setec --strict

      - name: Helm template (render check, default values)
        # Ensures every template renders against default values without error.
        run: helm template setec charts/setec >/dev/null

      - name: Helm template (Phase 3 enabled)
        # Catches regressions in Phase 3 chart extensions without
        # requiring a live cluster. mTLS is mandatory so the tls
        # Secret names are supplied explicitly.
        run: |
          helm template setec charts/setec \
            --set snapshots.enabled=true \
            --set nodeAgent.enabled=true \
            --set webhook.enabled=true >/dev/null

      - name: Helm template (frontend enabled with mTLS)
        # The frontend requires both TLS Secret names; without them the
        # chart refuses to render. This gate exercises that path.
        run: |
          helm template setec charts/setec \
            --set frontend.enabled=true \
            --set frontend.tlsCertSecretName=frontend-tls \
            --set frontend.tlsClientCASecretName=frontend-ca >/dev/null

  # ---- docker build validity (fast tier / pull_request) ----
  # Expensive (image build) but no push and no deploy -- a compile-validity
  # signal, not a scanner or authoritative suite. Kept on pull_request to
  # match today's behaviour rather than moved to merge_group.
  docker-build:
    name: Docker build (no push)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (linux/amd64, no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: false
          tags: setec:ci-local
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---- cheap guard checks (fast tier / pull_request) ----
  flag-smoke-test:
    name: Binary flag smoke test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        run: |
          go build -o bin/manager ./cmd
          go build -o bin/node-agent ./cmd/node-agent
          go build -o bin/frontend ./cmd/frontend

      - name: Smoke-test manager --help
        # Catches flag-parsing regressions (Phase 3 adds snapshots-enabled
        # and the nodeagent-tls-* triple). --help is a pure dry-run, no
        # side effects.
        run: |
          ./bin/manager --help 2>&1 | tee manager-help.txt
          grep -q -- '--snapshots-enabled' manager-help.txt
          grep -q -- '--nodeagent-tls-cert' manager-help.txt
          grep -q -- '--kata-socket-pattern' manager-help.txt

      - name: Smoke-test node-agent --help
        run: |
          ./bin/node-agent --help 2>&1 | tee node-agent-help.txt
          grep -q -- '-grpc-listen-addr' node-agent-help.txt
          grep -q -- '-snapshot-root' node-agent-help.txt
          grep -q -- '-snapshot-backend' node-agent-help.txt

  link-check:
    name: Markdown link check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # Fail the build on broken internal links; external links remain
          # warn-only for v0.1.0 so transient upstream outages do not block
          # contributor PRs.
          args: >-
            --no-progress
            --accept 200,204,206,429
            --offline
            './**/*.md'
          fail: true

  no-marker-in-source:
    name: No TODO/FIXME/XXX/HACK markers in production source
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Grep Go sources for markers
        # Excludes vendor/bin dirs; uses grep exit 1 as the fail signal
        # and inverts it so this step succeeds only when no matches.
        run: |
          if grep -rEn "TODO|FIXME|XXX|HACK" --include="*.go" --exclude-dir=vendor --exclude-dir=bin . ; then
            echo "::error::production Go sources contain TODO/FIXME/XXX/HACK markers; resolve or delete each one"
            exit 1
          fi

      - name: Grep markdown docs for markers
        # docs/launch/ is allowed (release-tracking files track future work)
        # but every other .md must be marker-free.
        run: |
          if grep -rEn "TODO|FIXME|XXX|HACK" --include="*.md" --exclude-dir=docs/launch . ; then
            echo "::error::markdown docs outside docs/launch/ contain TODO/FIXME/XXX/HACK markers"
            exit 1
          fi

  no-insecure-flag-in-chart:
    name: Chart templates are mTLS-only
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Grep chart for insecure flags
        run: |
          if grep -rE "auth-disabled|insecure-grpc" charts/setec/ ; then
            echo "::error::chart templates/values still reference insecure flags; mTLS is mandatory"
            exit 1
          fi

  no-unimplemented-in-frontend:
    name: Frontend has no codes.Unimplemented
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Grep internal/frontend for Unimplemented
        run: |
          if grep -rn "codes.Unimplemented" internal/frontend/ ; then
            echo "::error::internal/frontend still returns codes.Unimplemented; implement or delete the RPC"
            exit 1
          fi

  # ---- examples (separate Go modules under examples/, unreachable by the
  # reusable, which only knows the root module) ----
  examples-build:
    name: Examples build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        example:
          - ai-code-exec
          - ci-sandbox
          - sec-research
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build ${{ matrix.example }}
        working-directory: examples/${{ matrix.example }}
        run: go build ./...

  # ---- examples govulncheck (heavy tier / merge_group) ----
  # Moved from the now-deleted security.yaml: that workflow's root-module
  # govulncheck is superseded by the `heavy` job's reusable call above; these
  # three example-module scans are preserved here (the reusable only reaches
  # the root module). Scanner cadence -> merge_group per decision 9. Pinned
  # to the same govulncheck version the reusable installs (v1.1.4) instead
  # of the old `@latest`, so one PR/queue run sees one consistent version.
  examples-govulncheck:
    name: Examples govulncheck
    if: github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        example:
          - ai-code-exec
          - ci-sandbox
          - sec-research
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: run govulncheck on examples/${{ matrix.example }}
        working-directory: examples/${{ matrix.example }}
        run: govulncheck ./...
