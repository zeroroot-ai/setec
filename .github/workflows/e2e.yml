# End-to-end tests for Setec against a real Kata + Firecracker stack.
#
# These tests require KVM and a pre-installed Kubernetes cluster with the
# `kata-fc` RuntimeClass. GitHub-hosted runners cannot satisfy that
# requirement, so the workflow targets a self-hosted runner labeled
# `setec-bare-metal`.
#
# Triggers:
#   - pull_request: only when the PR carries the `e2e` label. This lets the
#     core CI run on every PR without forcing a bare-metal runner to exist.
#   - push to main: runs unconditionally once a PR merges, catching any
#     regression that slipped past the labeled pre-merge check.
#
# When no self-hosted runner matches the labels, the job simply stays queued
# and eventually expires — it does NOT fail the commit status, keeping the
# branch protection green on forks / environments without bare metal.

name: e2e

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  e2e:
    # Only run on PRs explicitly marked `e2e` (or on push-to-main, which has
    # no pull_request context and therefore passes this guard).
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'e2e'))

    runs-on: [self-hosted, setec-bare-metal]
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify KVM is available
        # Fail fast if the runner was mis-labeled or the kernel module isn't
        # loaded. Without /dev/kvm, Kata cannot launch any microVM and every
        # scenario will fail for the wrong reason.
        run: |
          if [ ! -e /dev/kvm ]; then
            echo "::error::/dev/kvm is not present; this runner cannot execute Firecracker microVMs."
            exit 1
          fi
          ls -l /dev/kvm

      - name: Verify kubectl and helm are on PATH
        run: |
          kubectl version --client=true
          helm version

      - name: Ensure kata-deploy is installed
        # Idempotent: if kata-deploy has already been applied out of band (e.g.
        # by a prior job on this runner) we skip re-applying. Otherwise we
        # install the upstream manifest. Pin KATA_DEPLOY_REF from repo env
        # when a specific release is required; default to `stable`.
        env:
          KATA_DEPLOY_REF: ${{ vars.KATA_DEPLOY_REF || 'stable' }}
        run: |
          if kubectl get ds -n kube-system kata-deploy >/dev/null 2>&1; then
            echo "kata-deploy already present; skipping install."
          else
            echo "Installing kata-deploy (ref=${KATA_DEPLOY_REF})"
            kubectl apply -k "github.com/kata-containers/kata-containers/tools/packaging/kata-deploy/kata-deploy/base?ref=${KATA_DEPLOY_REF}"
            kubectl -n kube-system rollout status ds/kata-deploy --timeout=10m
          fi

      - name: Wait for kata-fc RuntimeClass
        # kata-deploy registers multiple RuntimeClasses asynchronously. The
        # Setec E2E suite requires `kata-fc` specifically.
        run: |
          for i in $(seq 1 60); do
            if kubectl get runtimeclass kata-fc >/dev/null 2>&1; then
              echo "kata-fc RuntimeClass is ready."
              exit 0
            fi
            echo "[$i] waiting for kata-fc RuntimeClass..."
            sleep 5
          done
          echo "::error::kata-fc RuntimeClass did not appear within 5 minutes"
          exit 1

      - name: Verify a NetworkPolicy-enforcing CNI is installed
        # Phase 2 NetworkPolicy tests (TestPhase2_NetworkPolicyEnforced)
        # need a CNI that enforces NetworkPolicy. Calico is the
        # recommended choice on bare-metal runners; Cilium also works.
        # The step is informational: tests that need enforcement Skip
        # gracefully when it is missing.
        run: |
          if kubectl get ds -n kube-system calico-node >/dev/null 2>&1; then
            echo "Calico detected."
          elif kubectl get ds -n kube-system cilium >/dev/null 2>&1; then
            echo "Cilium detected."
          else
            echo "::warning::no NetworkPolicy-enforcing CNI detected; Phase 2 netpol tests will Skip."
          fi

      - name: Build operator image
        # Built locally to avoid registry dependencies; the test harness
        # picks up the tag via SETEC_E2E_IMAGE so Helm renders the local
        # tag instead of the chart default.
        run: make docker-build IMG=setec-e2e:${{ github.sha }}

      - name: Run e2e suite
        env:
          SETEC_E2E_IMAGE: setec-e2e:${{ github.sha }}
        run: make e2e

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          mkdir -p e2e-artifacts
          kubectl get nodes -o wide               > e2e-artifacts/nodes.txt       2>&1 || true
          kubectl get sandboxes -A -o yaml        > e2e-artifacts/sandboxes.yaml  2>&1 || true
          kubectl get pods -A -o wide             > e2e-artifacts/pods.txt        2>&1 || true
          kubectl get events -A --sort-by=.lastTimestamp \
                                                  > e2e-artifacts/events.txt      2>&1 || true

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-diagnostics-${{ github.run_id }}
          path: e2e-artifacts/
          if-no-files-found: ignore
