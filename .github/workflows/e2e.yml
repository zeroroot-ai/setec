# End-to-end round-trip smoke against the ALREADY-DEPLOYED staging setec
# (Epic: cicd-efficiency, board #44 / zeroroot-ai/deploy#1067 / ADR-0060).
#
# Replaces the old self-hosted `setec-bare-metal` model, which installed
# kata-deploy + the setec chart FROM THE PR'S OWN WORKING TREE into a
# throwaway namespace on a persistent bare-metal box. That model is gone —
# `ec2-kind-standup` / `workstation-setec-kvm` are decommissioned and no
# persistent self-hosted runner exists anywhere in the org.
#
# NEW model: ephemeral ARC runner pods (`runs-on: staging-ephemeral`) are
# NORMAL pods in staging EKS — no /dev/kvm, no nodeSelector onto the
# setec-metal Karpenter NodePool. The KVM requirement is satisfied by the
# setec sandbox-host node that Karpenter provisions on demand for the
# ALREADY-DEPLOYED staging setec Application; the runner pod only needs
# namespaced RBAC (gitops envs/staging/manifests/arc-runners/rbac.yaml) to
# drive that deployment's Sandbox API.
#
# ⚠ KNOWN PARITY GAP (zeroroot-ai/setec#<TBD> — filed alongside this PR):
# this workflow can no longer validate the OPERATOR/CONTROLLER code a PR
# actually changes — it round-trip-smokes whatever manager/runtime-agent
# build is CURRENTLY LIVE in staging, not the PR's own build. The old
# self-hosted model tested PR code directly (fresh chart install from the
# working tree); that coverage has no equivalent here without either (a) a
# namespace-scoped shadow install with its own install-time RBAC grant (a
# much larger RBAC surface than the read/watch-only grant this job runs
# with), or (b) reintroducing a real-KVM runner class for this one job. The
# `build-images` job below still builds + pushes sha-tagged images so that
# gap can be closed later without re-plumbing the pipeline — it is not
# wasted work, just not yet wired into the round-trip assertion.
#
# ⚠ PREREQUISITE GAP: staging's gitops overlay currently ships
# `setec.enabled: false` / `frontend.enabled: false` (envs/staging/
# values.yaml in the deploy repo) — i.e. setec is NOT actually deployed to
# staging yet, despite the setec-metal Karpenter NodePool already existing
# in Terraform. This workflow's `staging setec healthy` assertion will fail
# until that is flipped on (tracked follow-up, filed alongside this PR).
#
# Triggers: `merge_group` (the authoritative pre-merge gate — trusted
# context only, so fork PRs never reach the in-cluster runner) and manual
# `workflow_dispatch`. No more `pull_request`/`push` — the `e2e` PR label
# opt-in model is retired along with the runner it depended on.

name: e2e

on:
  merge_group:
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write   # build-images pushes to ghcr

jobs:
  # ----------------------------------------------------------------------
  # build-images — GitHub-hosted (ADR-0060: no metal needed to build a Go
  # binary + container image, only to run it). Publishes sha-tagged images
  # so a real cluster install can reference this PR's exact build once the
  # parity gap above is closed; also serves as a build-sanity check the old
  # workflow implicitly ran via `docker build ... -t :dev`.
  # ----------------------------------------------------------------------
  build-images:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      manager_image: ${{ steps.tags.outputs.manager_image }}
      runtime_agent_image: ${{ steps.tags.outputs.runtime_agent_image }}
    steps:
      - uses: actions/checkout@v7

      - name: Compute image tags
        id: tags
        run: |
          sha_tag="sha-${GITHUB_SHA::12}"
          echo "manager_image=ghcr.io/zeroroot-ai/setec:${sha_tag}" >> "$GITHUB_OUTPUT"
          echo "runtime_agent_image=ghcr.io/zeroroot-ai/setec-runtime-agent:${sha_tag}" >> "$GITHUB_OUTPUT"

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build + push manager (CMD=manager)
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: CMD=manager
          push: true
          tags: ${{ steps.tags.outputs.manager_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build + push runtime-agent (CMD=runtime-agent)
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: CMD=runtime-agent
          push: true
          tags: ${{ steps.tags.outputs.runtime_agent_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ----------------------------------------------------------------------
  # roundtrip — drives the already-deployed staging setec from an ephemeral
  # ARC runner pod. Achievable core preserved from the old suite: microVM
  # boots (kata-qemu backend, setec#86 — kata-fc's dev-loopback devmapper
  # snapshotter is flaky under load), workload executes, result returns.
  # NOT preserved: NetworkPolicy-enforcement scenario, admission-webhook
  # scenarios, and any assertion that exercises the PR's own controller code
  # (see the parity-gap note above) — those lived in test/e2e/... (`make
  # e2e`, go:build e2e) and have no direct replacement in this workflow.
  # ----------------------------------------------------------------------
  roundtrip:
    needs: build-images
    runs-on: staging-ephemeral
    timeout-minutes: 30
    env:
      SETEC_NAMESPACE: setec-system
      # VERIFY at setec-enablement time — matches the vendored chart's
      # `<fullname>-frontend` convention; the live in-cluster name depends on
      # the Helm release name staging installs setec under.
      SETEC_FRONTEND_SERVICE: setec-frontend
    steps:
      - uses: actions/checkout@v7

      - name: Verify kubectl is on PATH and can reach the cluster
        run: |
          kubectl version --client=true
          kubectl auth can-i get pods -n "${SETEC_NAMESPACE}" || {
            echo "::error::arc-runner-sa lacks the expected setec-system RBAC — check gitops envs/staging/manifests/arc-runners/rbac.yaml"
            exit 1
          }

      - name: Assert staging setec operator is deployed and healthy
        run: |
          set -euo pipefail
          if ! kubectl get deploy -n "${SETEC_NAMESPACE}" -l app.kubernetes.io/name=setec >/dev/null 2>&1; then
            echo "::error::no setec Deployment found in ${SETEC_NAMESPACE} — staging's setec is not deployed yet (envs/staging/values.yaml setec.enabled must be true; see the tracked follow-up)."
            exit 1
          fi
          kubectl rollout status deploy -n "${SETEC_NAMESPACE}" -l app.kubernetes.io/name=setec --timeout=120s

      - name: Ensure a kata-qemu SandboxClass exists (throwaway, this run only)
        # SandboxClass is CLUSTER-scoped (api/v1alpha1/sandboxclass_types.go:
        # +kubebuilder:resource:scope=Cluster) — no namespace field. The
        # arc-runner-sa grant for this resource is therefore a (narrowly
        # scoped) ClusterRole, not a namespaced Role — see gitops
        # envs/staging/manifests/arc-runners/rbac.yaml.
        run: |
          set -euo pipefail
          cat <<EOF | kubectl apply -f -
          apiVersion: setec.zeroroot.ai/v1alpha1
          kind: SandboxClass
          metadata:
            name: setec-e2e-roundtrip-qemu-${{ github.run_id }}
          spec:
            vmm: qemu
            runtime:
              backend: kata-qemu
            maxResources:
              vcpu: 2
              memory: 1Gi
          EOF

      - name: Create throwaway Sandbox + assert boot / execute / result
        env:
          GIBSON_EXECUTOR_IMAGE: ${{ vars.GIBSON_EXECUTOR_IMAGE || 'ghcr.io/zeroroot-ai/gibson-executor:main' }}
          SANDBOX_NAME: setec-e2e-roundtrip-${{ github.run_id }}
          SANDBOX_CLASS: setec-e2e-roundtrip-qemu-${{ github.run_id }}
        run: |
          set -euo pipefail
          # spec.resources is required (api/v1alpha1/sandbox_types.go);
          # vcpu/memory must stay within the SandboxClass's maxResources.
          cat <<EOF | kubectl apply -f -
          apiVersion: setec.zeroroot.ai/v1alpha1
          kind: Sandbox
          metadata:
            name: ${SANDBOX_NAME}
            namespace: ${SETEC_NAMESPACE}
          spec:
            sandboxClassName: ${SANDBOX_CLASS}
            image: ${GIBSON_EXECUTOR_IMAGE}
            command: ["/bin/sh", "-c", "echo SETEC_E2E_ROUNDTRIP_OK && sleep 2"]
            resources:
              vcpu: 1
              memory: 512Mi
          EOF

          # Phase enum: Pending/Running/Completed/Failed/Paused/Snapshotting/
          # Restoring (api/v1alpha1/sandbox_types.go). A one-shot Command
          # microVM transitions Running -> Completed on exit.
          echo "waiting for Sandbox ${SANDBOX_NAME} to boot and complete..."
          for i in $(seq 1 60); do
            phase="$(kubectl get sandbox -n "${SETEC_NAMESPACE}" "${SANDBOX_NAME}" -o jsonpath='{.status.phase}' 2>/dev/null || true)"
            if [ "$phase" = "Completed" ]; then
              echo "Sandbox reached phase=Completed after ${i} polls."
              break
            fi
            if [ "$phase" = "Failed" ]; then
              echo "::error::Sandbox ${SANDBOX_NAME} reached phase=Failed"
              kubectl describe sandbox -n "${SETEC_NAMESPACE}" "${SANDBOX_NAME}" || true
              exit 1
            fi
            sleep 5
          done

          final_phase="$(kubectl get sandbox -n "${SETEC_NAMESPACE}" "${SANDBOX_NAME}" -o jsonpath='{.status.phase}' 2>/dev/null || true)"
          if [ "$final_phase" != "Completed" ]; then
            echo "::error::Sandbox ${SANDBOX_NAME} did not reach phase=Completed within 5 minutes (last observed: '${final_phase:-<empty>}')"
            kubectl describe sandbox -n "${SETEC_NAMESPACE}" "${SANDBOX_NAME}" || true
            exit 1
          fi

          pod="$(kubectl get pods -n "${SETEC_NAMESPACE}" -l setec.zeroroot.ai/sandbox="${SANDBOX_NAME}" -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)"
          if [ -z "$pod" ]; then
            echo "::error::no workload pod found for Sandbox ${SANDBOX_NAME}"
            kubectl get pods -n "${SETEC_NAMESPACE}" || true
            exit 1
          fi

          echo "reading logs from pod ${pod}..."
          logs="$(kubectl logs -n "${SETEC_NAMESPACE}" "${pod}" --tail=50 2>&1 || true)"
          echo "$logs"
          echo "$logs" | grep -q "SETEC_E2E_ROUNDTRIP_OK" || {
            echo "::error::result marker not found in workload pod logs — microVM booted but did not execute/return the expected result"
            exit 1
          }
          echo "round-trip OK: microVM booted, workload executed, result returned."

      - name: Cleanup (always)
        if: always()
        run: |
          kubectl delete sandbox -n "${SETEC_NAMESPACE}" "setec-e2e-roundtrip-${{ github.run_id }}" --ignore-not-found --wait=false
          kubectl delete sandboxclass -n "${SETEC_NAMESPACE}" "setec-e2e-roundtrip-qemu-${{ github.run_id }}" --ignore-not-found --wait=false

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          mkdir -p e2e-artifacts
          kubectl get nodes -o wide                              > e2e-artifacts/nodes.txt       2>&1 || true
          kubectl get sandboxes -n "${SETEC_NAMESPACE}" -o yaml   > e2e-artifacts/sandboxes.yaml  2>&1 || true
          kubectl get pods -n "${SETEC_NAMESPACE}" -o wide        > e2e-artifacts/pods.txt        2>&1 || true
          kubectl get events -n "${SETEC_NAMESPACE}" --sort-by=.lastTimestamp \
                                                                   > e2e-artifacts/events.txt      2>&1 || true

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-diagnostics-${{ github.run_id }}
          path: e2e-artifacts/
          if-no-files-found: ignore
