# End-to-end tests for Setec against a real Kata + Firecracker stack.
#
# These tests require KVM and a pre-installed Kubernetes cluster with the
# `kata-fc` RuntimeClass. GitHub-hosted runners cannot satisfy that
# requirement, so the workflow targets a self-hosted runner labeled
# `setec-bare-metal`.
#
# Triggers:
#   - pull_request: only when the PR carries the `e2e` label. This lets the
#     core CI run on every PR without forcing a bare-metal runner to exist.
#   - push to main: runs unconditionally once a PR merges, catching any
#     regression that slipped past the labeled pre-merge check.
#
# When no self-hosted runner matches the labels, the job simply stays queued
# and eventually expires — it does NOT fail the commit status, keeping the
# branch protection green on forks / environments without bare metal.

name: e2e

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  e2e:
    # Only run on PRs explicitly marked `e2e` (or on push-to-main, which has
    # no pull_request context and therefore passes this guard).
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'e2e'))

    runs-on: [self-hosted, setec-bare-metal]
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify KVM is available
        # Fail fast if the runner was mis-labeled or the kernel module isn't
        # loaded. Without /dev/kvm, Kata cannot launch any microVM and every
        # scenario will fail for the wrong reason.
        run: |
          if [ ! -e /dev/kvm ]; then
            echo "::error::/dev/kvm is not present; this runner cannot execute Firecracker microVMs."
            exit 1
          fi
          ls -l /dev/kvm

      - name: Verify kubectl and helm are on PATH
        run: |
          kubectl version --client=true
          helm version

      - name: Ensure kata-deploy is installed
        # Idempotent: if kata-deploy has already been applied out of band (e.g.
        # by a prior job on this runner) we skip re-applying. Otherwise we
        # install the upstream manifest. Pin KATA_DEPLOY_REF from repo env
        # when a specific release is required; default to `stable`.
        env:
          KATA_DEPLOY_REF: ${{ vars.KATA_DEPLOY_REF || 'stable' }}
        run: |
          if kubectl get ds -n kube-system kata-deploy >/dev/null 2>&1; then
            echo "kata-deploy already present; skipping install."
          else
            echo "Installing kata-deploy (ref=${KATA_DEPLOY_REF})"
            kubectl apply -k "github.com/kata-containers/kata-containers/tools/packaging/kata-deploy/kata-deploy/base?ref=${KATA_DEPLOY_REF}"
            kubectl -n kube-system rollout status ds/kata-deploy --timeout=10m
          fi

      - name: Wait for kata-fc RuntimeClass
        # kata-deploy registers multiple RuntimeClasses asynchronously. The
        # Setec E2E suite requires `kata-fc` specifically.
        run: |
          for i in $(seq 1 60); do
            if kubectl get runtimeclass kata-fc >/dev/null 2>&1; then
              echo "kata-fc RuntimeClass is ready."
              exit 0
            fi
            echo "[$i] waiting for kata-fc RuntimeClass..."
            sleep 5
          done
          echo "::error::kata-fc RuntimeClass did not appear within 5 minutes"
          exit 1

      - name: Verify a NetworkPolicy-enforcing CNI is installed
        # Phase 2 NetworkPolicy tests (TestPhase2_NetworkPolicyEnforced)
        # need a CNI that enforces NetworkPolicy. Calico is the
        # recommended choice on bare-metal runners; Cilium also works.
        # The step is informational: tests that need enforcement Skip
        # gracefully when it is missing.
        run: |
          if kubectl get ds -n kube-system calico-node >/dev/null 2>&1; then
            echo "Calico detected."
          elif kubectl get ds -n kube-system cilium >/dev/null 2>&1; then
            echo "Cilium detected."
          else
            echo "::warning::no NetworkPolicy-enforcing CNI detected; Phase 2 netpol tests will Skip."
          fi

      - name: Build and import component images
        # The chart deploys the operator (Deployment) and runtime-agent
        # (DaemonSet); node-agent is disabled by default. Build both from the
        # working tree as :dev images — the Dockerfile is multi-call via the
        # CMD build-arg (manager -> ghcr.io/zeroroot-ai/setec, others ->
        # ghcr.io/zeroroot-ai/setec-<cmd>) — matching development/k3s.
        #
        # docker build writes into docker's store, but the bare-metal cluster
        # runs on containerd (k3s) with no registry to pull from. Without the
        # containerd import the Pods sit in ErrImageNeverPull (the suite sets
        # pullPolicy=Never) and the chart's helm --wait times out. Import into
        # the k8s.io containerd namespace (the one k3s pulls Pod images from).
        # `sudo k3s ctr` is granted to the self-hosted runner via a sudoers
        # drop-in. No-op import on non-k3s clusters.
        run: |
          set -euo pipefail
          for c in manager runtime-agent; do
            img=ghcr.io/zeroroot-ai/setec
            [ "$c" != manager ] && img="ghcr.io/zeroroot-ai/setec-${c}"
            echo "::group::build ${img}:dev (CMD=${c})"
            docker build --build-arg CMD="${c}" -t "${img}:dev" .
            echo "::endgroup::"
            if command -v k3s >/dev/null 2>&1 && [ -S /run/k3s/containerd/containerd.sock ]; then
              docker save "${img}:dev" | sudo k3s ctr -n k8s.io images import -
            fi
          done
          if command -v k3s >/dev/null 2>&1 && [ -S /run/k3s/containerd/containerd.sock ]; then
            echo "Imaged in k3s containerd (k8s.io):"
            sudo k3s ctr -n k8s.io images ls -q | grep -E 'zeroroot-ai/setec(-runtime-agent)?:dev'
          else
            echo "k3s containerd not detected; assuming the cluster runtime can already see the :dev images."
          fi

      - name: Reap orphaned microVMs and sandboxes (clean slate)
        # A crashed or cancelled prior run can leave kata-fc microVMs running
        # and containerd holding their sandbox-name reservations. The next run
        # then fails every kata-fc RunPodSandbox with
        #   "failed to reserve sandbox name ... is reserved for <old-id>"
        # → the Pod sits in ContainerCreating forever and the sandbox scenarios
        # time out. This step guarantees an isolated starting state on the
        # self-hosted runner: drop leftover throwaway namespaces, reap orphaned
        # kata sandboxes (which releases the name reservations), and kill any
        # stray firecracker VMs whose shim is already gone. Best-effort — never
        # fails the job. No-op on a non-k3s runner.
        run: |
          set +e
          if ! command -v k3s >/dev/null 2>&1 || [ ! -S /run/k3s/containerd/containerd.sock ]; then
            echo "k3s containerd not detected; nothing to reap."
            exit 0
          fi
          RE="--runtime-endpoint unix:///run/k3s/containerd/containerd.sock"
          # 1) Drop leftover throwaway e2e namespaces from a prior crashed run.
          for ns in $(kubectl get ns -o name 2>/dev/null | sed 's#namespace/##' | grep -E '^setec-e2e-'); do
            kubectl delete ns "$ns" --force --grace-period=0 --wait=false 2>/dev/null
          done
          # 2) Reap orphaned (NotReady) kata sandboxes — releases the containerd
          #    name reservation that otherwise blocks reuse of the Pod name.
          for sb in $(sudo k3s crictl $RE pods --state notready -q 2>/dev/null); do
            timeout 30 sudo k3s crictl $RE rmp -f "$sb" 2>/dev/null
          done
          # 3) Kill stray firecracker VMs (exact comm match — never matches this
          #    shell). containerd reaps a sandbox's shim when its VM is gone.
          sudo pkill -9 -x firecracker 2>/dev/null
          # 4) Delete orphaned cluster-scoped webhook configs from a prior run.
          #    These are NOT namespaced, so dropping the namespace (step 1) does
          #    not remove them; left behind (failurePolicy: Fail, matching
          #    sandboxes/sandboxclasses cluster-wide) they point at a deleted
          #    Service and break every Sandbox/SandboxClass create in the next
          #    run with "service ... not found".
          for w in $(kubectl get validatingwebhookconfiguration,mutatingwebhookconfiguration -o name 2>/dev/null | grep -E 'setec-e2e-'); do
            kubectl delete "$w" --wait=false 2>/dev/null
          done
          echo "clean-slate reap done; firecracker VMs now: $(pgrep -cx firecracker 2>/dev/null || echo 0)"
          exit 0

      - name: Run e2e suite
        # The suite installs the chart with image.tag=dev + pullPolicy=Never
        # for every deployed component (see SETEC_E2E_IMAGE_TAG default in
        # test/e2e/suite_test.go), using the images imported above.
        run: make e2e

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          mkdir -p e2e-artifacts
          kubectl get nodes -o wide               > e2e-artifacts/nodes.txt       2>&1 || true
          kubectl get sandboxes -A -o yaml        > e2e-artifacts/sandboxes.yaml  2>&1 || true
          kubectl get pods -A -o wide             > e2e-artifacts/pods.txt        2>&1 || true
          kubectl get events -A --sort-by=.lastTimestamp \
                                                  > e2e-artifacts/events.txt      2>&1 || true

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-diagnostics-${{ github.run_id }}
          path: e2e-artifacts/
          if-no-files-found: ignore
