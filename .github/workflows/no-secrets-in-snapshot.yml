# no-secrets-in-snapshot gate (ADR-0052, setec#66).
#
# A Snapshot is restored to warm a pool and is therefore shared across every
# warm-pool claim of a SandboxClass. Any secret baked into snapshot state
# would leak to every future tenant that restores it. The architectural rule
# is: secrets are injected per-lease POST-restore over the control plane,
# never present at snapshot time.
#
# This workflow is the enforcement gate. It:
#   1. Verifies the secretscan detector itself is healthy (unit tests).
#   2. Builds the setec-snapshot-scan CLI.
#   3. Self-tests the gate: a known-leaky fixture MUST be rejected (proving
#      the gate cannot silently pass), and a clean fixture MUST pass.
#   4. Scans any snapshot artifacts produced at $SETEC_SNAPSHOT_ARTIFACTS
#      (populated by the e2e snapshot job when present).
name: no-secrets-in-snapshot

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: no-secrets-in-snapshot-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan-gate:
    name: no-secrets-in-snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Unit-test the secret detector
        run: go test ./internal/snapshot/secretscan/... ./cmd/setec-snapshot-scan/...

      - name: Build the snapshot scan gate
        run: go build -o bin/setec-snapshot-scan ./cmd/setec-snapshot-scan

      - name: Self-test — a leaky artifact MUST be rejected
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          printf 'AWS_SECRET_ACCESS_KEY=wJalrXUtnFEMIabc1234567890abcdEXAMPLEKEY12\n' > "$tmp/memory.bin"
          if bin/setec-snapshot-scan "$tmp"; then
            echo "::error::scan gate PASSED a known-leaky artifact — the gate is broken"
            exit 1
          fi
          echo "scan gate correctly rejected the leaky fixture"

      - name: Self-test — a clean artifact MUST pass
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          printf 'PORT=8080\nLOG_LEVEL=info\nbenign state\n' > "$tmp/state.bin"
          bin/setec-snapshot-scan "$tmp"
          echo "scan gate correctly accepted the clean fixture"

      - name: Scan produced snapshot artifacts (if any)
        run: |
          set -euo pipefail
          dir="${SETEC_SNAPSHOT_ARTIFACTS:-./.snapshot-artifacts}"
          if [ -d "$dir" ]; then
            echo "scanning snapshot artifacts under $dir"
            bin/setec-snapshot-scan "$dir"
          else
            echo "no snapshot-artifact directory at $dir; nothing further to scan"
          fi
