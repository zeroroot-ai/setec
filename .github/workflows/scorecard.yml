# SPDX-License-Identifier: Apache-2.0
#
# OSSF Scorecard supply-chain health analysis.
#
# The action requires the repository to be public and certain
# permissions to be granted at the org level. Results are uploaded as
# SARIF to the Security tab; the badge URL after the first run will be
#
#   https://api.scorecard.dev/projects/github.com/zero-day-ai/setec/badge
#
# and can be placed in README.md.
name: OSSF Scorecard

on:
  branch_protection_rule:
  push:
    branches: [main]
  schedule:
    # Weekly run: Monday 07:00 UTC.
    - cron: "0 7 * * 1"

permissions: read-all

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
